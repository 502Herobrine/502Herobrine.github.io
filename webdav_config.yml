# ──────────────────────────────────────────────────────────────────────────────
# WebDAV 同步配置 / WebDAV Sync Configuration
# ──────────────────────────────────────────────────────────────────────────────
#
# 凭据通过 GitHub Secrets 配置（不要将密码写入此文件！）：
#   WEBDAV_USER     – WebDAV 用户名（坚果云账号邮箱）
#   WEBDAV_PASSWORD  – WebDAV 应用密码（在坚果云 → 设置 → 安全选项 → 第三方应用管理 中生成）
#
# 使用方法：
#   1. 在 GitHub 仓库 → Settings → Secrets and variables → Actions 中添加上述两个 Secret
#   2. 修改下方 remote_path 为你坚果云中笔记所在的文件夹名
#   3. 修改 whitelist 为你需要同步的文件/文件夹模式
#   4. 推送到 main 分支，GitHub Actions 会定时（每 30 分钟）自动同步
# ──────────────────────────────────────────────────────────────────────────────

webdav:
  # WebDAV 服务器地址（坚果云 WebDAV 地址，一般无需修改）
  url: "https://dav.jianguoyun.com/dav/"
  # 远程笔记根目录（坚果云中的文件夹名称）
  remote_path: "我的笔记"

# ── 同步白名单 ──────────────────────────────────────────────────────────────
# 只有匹配以下 glob 模式的文件会被同步（相对于 remote_path）。
# 示例：
#   "控制原理/**"    – 同步 控制原理 文件夹下所有文件（包括子目录）
#   "数学/*.md"      – 只同步 数学 文件夹下的 .md 文件
#   "*.md"           – 同步根目录下的 .md 文件
#   "**/*.md"        – 同步所有目录下的 .md 文件
whitelist:
  - "**/*.md"
  - "**/*.png"
  - "**/*.jpg"
  - "**/*.jpeg"
  - "**/*.gif"
  - "**/*.svg"
  - "**/*.webp"
  - "**/*.bmp"

# ── 排除列表 ──────────────────────────────────────────────────────────────
# 匹配以下模式的文件不会被同步（优先于白名单）。
exclude:
  - ".obsidian/**"
  - ".trash/**"
  - "node_modules/**"
  - "_site/**"
