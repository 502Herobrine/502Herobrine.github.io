# Workflow for building Obsidian notes into a Docsify site and deploying to GitHub Pages
#
# Converts Obsidian-flavored Markdown (e.g. ![[image.jpg|600]]) to standard
# Markdown, auto-generates the sidebar, and deploys to GitHub Pages.
#
name: Deploy Obsidian Notes to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Convert Obsidian notes to Docsify site
        run: python scripts/convert_obsidian.py --src . --out _site

      - name: Install JS dependencies
        run: npm install --no-save docsify@4 katex

      - name: Bundle JS/CSS libraries into site
        run: |
          mkdir -p _site/lib/fonts
          cp node_modules/docsify/lib/docsify.min.js _site/lib/
          cp node_modules/docsify/lib/themes/vue.css _site/lib/
          # Remove the blocking Google Fonts @import from vue.css.
          # In China, Google Fonts is inaccessible and the render-blocking
          # @import causes the page to hang on "加载中..." until DNS times out.
          sed -i 's/@import url([^)]*fonts\.googleapis\.com[^)]*);*//g' _site/lib/vue.css
          cp node_modules/docsify/lib/plugins/search.min.js _site/lib/
          cp node_modules/docsify/lib/plugins/zoom-image.min.js _site/lib/
          cp node_modules/katex/dist/katex.min.js _site/lib/
          cp node_modules/katex/dist/katex.min.css _site/lib/
          cp node_modules/katex/dist/fonts/* _site/lib/fonts/

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
