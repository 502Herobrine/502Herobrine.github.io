<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>我的笔记站点</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="lib/vue.css">
  <!-- KaTeX 公式样式 -->
  <link rel="stylesheet" href="lib/katex.min.css">
  <style>
    /* Allow images to respect their width attribute while staying responsive */
    .markdown-section img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <!-- KaTeX 公式渲染（~270KB，同步加载，不阻塞 docsify） -->
  <script src="lib/katex.min.js"></script>
  <script>
    window.$docsify = {
      name: '我的笔记',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      search: 'auto',
      auto2top: true,
      relativePath: true,
      plugins: [
        // Protect LaTeX blocks from marked's backslash-escape processing,
        // then render them with KaTeX in the afterEach hook.
        function(hook) {
          var mathStore = {};

          hook.beforeEach(function(content) {
            mathStore = {};
            var counter = 0;
            // Protect display math ($$...$$) — must run before inline math
            content = content.replace(/\$\$([\s\S]+?)\$\$/g, function(match) {
              var key = counter++;
              mathStore[key] = { tex: match.slice(2, -2), display: true };
              return '<div class="docsify-math" data-key="' + key + '"></div>';
            });
            // Protect inline math ($...$)
            content = content.replace(/\$([^$\n]+?)\$/g, function(match) {
              var key = counter++;
              mathStore[key] = { tex: match.slice(1, -1), display: false };
              return '<span class="docsify-math" data-key="' + key + '"></span>';
            });
            return content;
          });

          hook.afterEach(function(html) {
            // Replace placeholders with KaTeX-rendered HTML.
            html = html.replace(
              /<(div|span) class="docsify-math" data-key="(\d+)"><\/\1>/g,
              function(match, tag, key) {
                var entry = mathStore[parseInt(key, 10)];
                if (entry == null) return match;
                try {
                  return katex.renderToString(entry.tex, {
                    displayMode: entry.display,
                    throwOnError: false
                  });
                } catch (e) {
                  console.error('KaTeX error:', e);
                  return '<' + tag + ' style="color:red">' + entry.tex + '</' + tag + '>';
                }
              }
            );
            return html;
          });
        }
      ]
    }
  </script>
  <script src="lib/docsify.min.js"></script>
  <!-- 全文搜索插件 -->
  <script src="lib/search.min.js"></script>
  <!-- 图片缩放插件 -->
  <script src="lib/zoom-image.min.js"></script>
</body>
</html>
